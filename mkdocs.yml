site_name: Delfus
site_url: https://docs.delfus.app/
site_description: Documentação do Delfus — análise avançada, moderação e gestão para comunidades Discord.
site_author: Delfus
copyright: © Delfus

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  logo: assets/mascote-feliz.png
  favicon: assets/favicon.ico
  font:
    text: Inter
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Mudar para tema claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Mudar para tema escuro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra:
  generator: false
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/mTjZg95UJV
      name: Servidor de Suporte
    - icon: fontawesome/solid/globe
      link: https://delfus.app
      name: Site
    - icon: fontawesome/solid/gauge
      link: https://admin.delfus.app
      name: Dashboard

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/home-search.js

plugins:
  - search
  - social:
      cards_layout_options:
        background_image: docs/assets/og-bg.png
        background_color: transparent
        color: "#ECE9F1"
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      zoomable: true
      draggable: true
  - git-revision-date-localized:
      type: timeago
      enable_creation_date: false
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Início: index.md
  - Primeiros passos:
      - Adicionar o bot: comecar/adicionar.md
      - Configuração inicial: comecar/configuracao.md
      - Idioma: comecar/idioma.md
  - Funcionalidades:
      - Visão geral: funcionalidades/index.md
      - Segurança:
          - Moderação e punições: funcionalidades/moderacao.md
          - Anti-raid: funcionalidades/anti-raid.md
          - Anti-invite: funcionalidades/anti-invite.md
          - Honeypot: funcionalidades/honeypot.md
          - Backups: funcionalidades/backup.md
      - Recepção e cargos:
          - Boas-vindas e despedida: funcionalidades/recepcao.md
          - Cargos automáticos: funcionalidades/auto-roles.md
          - Cargos por reação: funcionalidades/reaction-roles.md
      - Monetização:
          - VIP, assinaturas e recompensas: funcionalidades/vip.md
          - Recompensas de boost: funcionalidades/boost.md
      - Engajamento:
          - Starboard: funcionalidades/starboard.md
          - Mensagens e embeds: funcionalidades/mensagens.md
          - Emojis: funcionalidades/emojis.md
          - Aniversários: funcionalidades/aniversarios.md
          - Famílias: funcionalidades/familia.md
          - Correio: funcionalidades/correio.md
          - Automações de canal: funcionalidades/automacoes.md
      - Operação:
          - Gestão de equipe: funcionalidades/equipe.md
      - Análise:
          - Análise e insights: funcionalidades/analise.md
      - Utilidades:
          - Encurtador de links: funcionalidades/links.md
          - Download de vídeos: funcionalidades/video.md
          - Oráculo: funcionalidades/oraculo.md
  - Suporte: suporte.md
